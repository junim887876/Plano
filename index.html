<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barber Junim - Assinaturas</title>
    
    <style>
        /* Reset e Configurações Globais */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Imagem Fluida "Bem na cara" */
        .hero { width: 100%; display: flex; justify-content: center; background: #000; }
        .hero img { 
            width: 100%; 
            max-width: 800px; /* Evita que fique estourada em monitores gigantes */
            height: auto; 
            display: block; 
        }

        /* Seção de Links de Pagamento */
        .pagamento { padding: 60px 20px; text-align: center; background: #111; }
        .pagamento h2 { color: #f7a01a; margin-bottom: 35px; font-size: 1.8rem; }
        .botoes { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        /* Estilo Base dos Botões */
        .btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 18px 30px; border-radius: 8px; text-decoration: none; font-weight: bold;
            transition: all 0.3s ease; min-width: 280px; border: 2px solid;
        }
        .btn span:nth-child(1) { font-size: 1.3rem; margin-bottom: 5px; }
        .btn span:nth-child(2) { font-size: 1rem; font-weight: normal; }

        /* Inovação: Animação sutil para atrair o clique */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(247, 160, 26, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 15px 0 rgba(247, 160, 26, 0.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(247, 160, 26, 0); }
        }

        .black-card { 
            border-color: #f7a01a; color: #f7a01a; 
            animation: pulse 2.5s infinite; /* Chama atenção para o plano de entrada */
        }
        .black-card:hover { background: #f7a01a; color: #000; animation: none; transform: translateY(-3px); }

        .ultra-black { border-color: #fff; color: #fff; }
        .ultra-black:hover { background: #fff; color: #000; transform: translateY(-3px); }

        /* Inovação: Botão de WhatsApp Flutuante */
        .zap-flutuante {
            position: fixed; bottom: 25px; right: 25px;
            background: #25D366; color: white; border-radius: 50px;
            padding: 12px 24px; text-decoration: none; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: 0.3s; z-index: 1000;
        }
        .zap-flutuante:hover { background: #1ebd57; transform: translateY(-3px); }

        /* Responsividade para Celulares */
        @media (max-width: 600px) {
            .btn { width: 100%; min-width: auto; }
            .pagamento h2 { font-size: 1.5rem; }
            .zap-flutuante { bottom: 15px; right: 15px; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <main class="hero">
        <img src="anuncio.jpg" alt="Planos de Assinatura Barber Junim">
    </main>

    <section class="pagamento">
        <h2>Garanta seu plano agora:</h2>
        <div class="botoes">
            
            <a href="https://mpago.la/2mALeEa" class="btn black-card">
                <span>Assinar Black Card</span>
                <span>R$ 89,90/mês</span>
            </a>

            <a href="https://mpago.la/16ifaAN" class="btn ultra-black">
                <span>Assinar Ultra Black</span>
                <span>R$ 129,90/mês</span>
            </a>

        </div>
    </section>

    <a href="https://wa.me/5562984099756" target="_blank" class="zap-flutuante">
        Dúvidas? Chama no Zap!
    </a>

</body>
</html>
